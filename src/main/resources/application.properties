spring.application.name=RetailPulse Platform
spring.profiles.default=dev,local
server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/retailpulse}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui/index.html

retailpulse.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,https://polite-sea-0e075210f.7.azurestaticapps.net}
